<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="style.css">
  <title>Redes Sociais | Resinei Mcz</title>
  
  <style>
    body.fundo-marmorizado {
      background-image: url('images/sr.png'); /* Nome da sua imagem */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    .btn-social {
    display: block;
    width: 80%; /* Ocupa 80% da largura da tela */
    max-width: 300px;
    padding: 20px; /* Mais área de toque */
    margin: 10px auto;
    text-align: center;
    background-color: #25d366; /* Cor do Zap/Instagram */
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 10px;
    font-weight: bold;
  }

  /* Uma camada escura para o texto continuar legível sobre o mármore */
    .overlay {
      background: rgba(10, 15, 20, 0.527); 
      min-height: 100vh;
      padding: 40px;
    }

    .btn-nav-site {
        display: inline-block;
        margin-top: 40px;
        padding: 20px 40px;
        background-color: rgba(212, 175, 55, 0.1); /* Fundo dourado suave */
        border: 2px solid #d4af37;
        color: #d4af37;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-nav-site:active {
        transform: scale(0.95); /* Efeito de "apertar" o botão no celular */
        background-color: #d4af37;
        color: #000;
    }

  </style>
</head>

<body class="fundo-marmorizado">
  <div class="overlay">
    <main class="content-main" style="margin-left: 0; text-align: center;">
      <h1 class="titulo">SIGA A <span>RESINEI MCZ</span></h1>
      
      <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 20px; align-items: center;">
        <a href="https://www.instagram.com/resineimcz/" class="btn-comprar-zap" style="width: 250px;">Instagram</a>
        <a href="https://www.tiktok.com/@resineimcz" class="btn-comprar-zap" style="width: 250px;">TikTok</a>
      </div>

      <div style="margin-top: 40px;">
    <a href="index.html" class="btn-nav-site">
    CONHEÇA NOSSO SITE
</a>
</div>
    </main>
  </div>
</body>
</html>
